# Per-repo no-mistakes overrides.

# firstmate is an agent-orchestration repo: its AGENTS.md installs a fleet-captain
# identity. Disable project-level agent settings/instructions for gate agents so a
# no-mistakes review/test/document/lint/pr/rebase/ci agent never adopts that
# identity or drives the fleet. Trusted-only: a pushed branch cannot turn this off,
# so it is honored only from the default-branch copy of this file. Layered above
# the NO_MISTAKES_GATE lifecycle refusal (bin/fm-gate-refuse-lib.sh) and the
# HEAD-continuity guard; see docs/architecture.md "No-mistakes gate authority boundary."
disable_project_settings: true

# Run the firstmate bash behavior suite deterministically as the test-step
# baseline, instead of delegating to an agent (an agent-driven test step has
# crashed the daemon). Mirrors .github/workflows/ci.yml: iterate every
# tests/*.test.sh, run each, and fail the step if any one exits non-zero. The
# e2e tests need tmux on PATH, which the firstmate environment provides.
commands:
  test: 'command -v tmux >/dev/null || { echo "tmux is required for e2e tests" >&2; exit 1; }; tmux -V; rc=0; for t in tests/*.test.sh; do echo "== $t =="; bash "$t" || rc=1; done; exit "$rc"'

# Keep test evidence out of this repo; it stays in a temp dir instead.
test:
  evidence:
    store_in_repo: false
